# API provider secret metadata for chezmoi templates.
#
# This file may contain Bitwarden item IDs / stable item names only.
# Never store API keys, tokens, or other secret values here.
#
# Each entry uses the Bitwarden custom field named in `field` (per-item).
api_secrets:
  - env: GH_TOKEN
    item: "e3b401ae-2ed9-489b-8328-b1a9003e3cdb"
    source: custom_field
    field: main_token
    runtime: both

  - env: GITHUB_API_TOKEN
    item: "2c743b49-7e20-4d76-9314-b1a90034fbdc"
    source: custom_field
    field: gh_main
    runtime: both

  - env: OPENROUTER_API_KEY
    item: "eaefa7ca-a68b-4de5-bf20-b26000f35f93"
    source: custom_field
    field: CODEX
    runtime: both

  - env: MOONSHOT_API_KEY
    item: "a8f52707-d5d7-4827-9f19-b46c00d3af49"
    source: custom_field
    field: main
    runtime: both

  - env: OLLAMA_API_KEY
    item: "098ec527-38dc-47f7-89f8-b47200111ff9"
    source: custom_field
    field: main
    runtime: both

  - env: CURSOR_API_KEY
    item: "f7b3a130-63bd-4293-9f0c-b47c002f68b3"
    source: custom_field
    field: main
    runtime: both

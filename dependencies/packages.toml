# Layer 3: cargo-installed tools (Containerfile `toolchain` stage).
# Add `[[tool]]` entries with `manager = "cargo"` and `layer = 3`.
# Run `make gen-deps` to regenerate `dependencies/layer_3/cargo.txt`.
# (Currently empty — infrastructure-only landing per design spec §10 item 1.
# The empty cargo.txt is still generator-owned: see
# EXPECTED_EMPTY_FILES in programs/generate_deps/main.py.)

# Layer 3: mise-managed languages (Containerfile `toolchain` stage, Layer 3-5).
# Add `[[tool]]` entries with `manager = "mise"` and `layer = 3`. The
# generator renders each line as `<name>@latest` (bare `mise install
# <tool>` reads a mise.toml, not latest). Run `make gen-deps` to
# regenerate `dependencies/layer_3/mise.txt`.
[[tool]]
name = "go"
manager = "mise"
layer = 3
has_configs = false
description = "Go programming language (mise-managed, latest)"

[[tool]]
name = "python"
manager = "mise"
layer = 3
has_configs = false
description = "CPython (mise-managed, latest)"

[[tool]]
name = "deno"
manager = "mise"
layer = 3
has_configs = false
description = "Deno runtime (mise-managed, latest)"

# Layer 4: paru-installed tools (AUR); Containerfile `aur` stage.
# paru itself is bootstrapped via makepkg in the `aur` stage, so it is
# declared here with `manager = "custom"` (doc-only: it appears in the
# spec 02 AUTO-GEN block and satisfies I5, but is NOT written to
# `layer_4/paru.txt` -- re-submitting an already-bootstrapped AUR helper
# as a `paru -S` target breaks paru's resolver). Every other AUR package
# uses `manager = "paru"` and `layer = 4`; run `make gen-deps` to
# regenerate `dependencies/layer_4/paru.txt`.

# THIS IS Paru
[[tool]]
name = "paru"
manager = "custom"
layer = 4
has_configs = false
description = "AUR helper; bootstrapped via makepkg in the aur stage (custom install path, not in paru.txt)"

# Layer 4: paru-installed tools (AUR); Containerfile `aur` stage.
#
# Almost all packages are installed via `paru -S` (pre-built binary).
# because it's faster than nix building and doesn't require building from source if it has binaries.
#
# TODO: Write this `Rust packages rule` into docs
# Rust packages rule:
#   Packages that depends on Rust toolchain are divided into two groups:
#   those that are built from source (using `cargo`) and those that are
#   installed via pre-built binaries (using `cargo install`).
#   Paru-installed packages should be:
#   - package we can install via `paru -S`, especially not building
#     - (that nearly equal it doesn't depend on pacman/paru's `rust` or `rustup` package)
#   - package it doesn't need to access beta or latest version.
#     - If we need beta or latest version, we install via `cargo install` to build from source.
#   - package that need to access from `cargo` or `rustup`
#     - (e.g. `cargo-outdated` or `cargo-zigbuild`)
#   Other packages should be installed via `cargo` (and `cargo-binstall`).

[[tool]]
name = "pueue"
manager = "paru"
layer = 4
has_configs = false
description = "task queue daemon"

[[tool]]
name = "rsync"
manager = "pacman"
layer = 1
has_configs = false

[[tool]]
name = "starship"
manager = "paru"
layer = 4
has_configs = false
description = "zsh prompt theme manager"

[[tool]]
name = "tmux"
manager = "paru"
layer = 4
has_configs = false
description = "tmux multiplexer"


[[tool]]
name = "neovim-git"
manager = "paru"
layer = 4
has_configs = false
description = "neovim built from upstream git master (AUR); first concrete AUR package"

[[tool]]
name = "wired"
manager = "paru"
layer = 4
has_configs = false
description = "notification daemon"


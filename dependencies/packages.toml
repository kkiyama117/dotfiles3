# Single source of truth for container tool dependencies.
#
# This file is HAND-EDITED. Run `make gen-deps` (from the repo root) to
# regenerate:
#   - dependencies/layer_<N>/<manager>.txt  (layers >= 1; list managers only)
#   - docs/specifications/02-installed-programs.md (AUTO-GEN block)
# Generator: programs/generate_deps/main.py
#
# Entries should be sorted alphabetically by `name`.
#
# Example of entry (Toml):
# [[tool]]
# name = "base-devel"
## Allowed `manager` values: pacman, paru, nix, uv, cargo, mise.
## `cargo` entries land in layer 3 (Containerfile `toolchain` stage).
# manager = "pacman"
# layer = 1
# has_configs = false
# description = "base meta-package: gcc, make, binutils, etc."
#

schema = 1

# Layer 0: Already installed by base image

[[tool]]
name = "pacman"
manager = "pacman"
layer = 0
# [mirrorlist](./container/layer_1_files/pacman_mirrorlist) is concreted for Japanese people.
has_configs = true

# Layer 1: Base image, minimum installation only for chezmoi apply
#          And install that must be used in our environment.
#          Aur Packages that don't need to container setup or configuration are installed by `paru` (Layer 4).

[[tool]]
name = "base-devel"
manager = "pacman"
layer = 1
has_configs = false
description = "base meta-package: gcc, make, binutils, etc."


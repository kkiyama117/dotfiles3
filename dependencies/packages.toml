# Single source of truth for container tool dependencies.
#
# This file is HAND-EDITED. Run `make gen-deps` (from the repo root) to
# regenerate:
#   - dependencies/layer_<N>/<manager>.txt  (layers >= 1; list managers only)
#   - docs/specifications/02-installed-programs.md (AUTO-GEN block)
# Generator: programs/generate_deps/main.py
#
# Example of entry:
# [[tool]]
# name = "base-devel"
# manager = "pacman"
# layer = 1
# has_configs = false
# description = "base meta-package: gcc, make, binutils, etc."
#
# Allowed `manager` values: pacman, paru, nix, uv, cargo, mise.
# `cargo` entries land in layer 3 (Containerfile `toolchain` stage).

schema = 1

# Layer 0: Already installed by base image

[[tool]]
name = "pacman"
manager = "pacman"
layer = 0
# [mirrorlist](./container/layer_1_files/pacman_mirrorlist) is concreted for Japanese people.
has_configs = true

# Layer 1: Base image, minimum installation only for chezmoi apply
#          And install that must be used in our environment.

[[tool]]
name = "base-devel"
manager = "pacman"
layer = 1
has_configs = false
description = "base meta-package: gcc, make, binutils, etc."

[[tool]]
name = "sudo"
manager = "pacman"
layer = 1
has_configs = false

[[tool]]
name = "curl"
manager = "pacman"
layer = 1
has_configs = false

[[tool]]
name = "git"
manager = "pacman"
layer = 1
has_configs = false

[[tool]]
name = "chezmoi"
manager = "pacman"
layer = 1
has_configs = false
description = "dotfiles manager"

[[tool]]
name = "openssh"
manager = "pacman"
layer = 1
has_configs = false

[[tool]]
name = "bitwarden-cli"
manager = "pacman"
layer = 1
has_configs = false
description = "Bitwarden CLI (`bw`); secret backend for chezmoi templates"

[[tool]]
name = "zsh"
manager = "pacman"
layer = 1
has_configs = false
description = "user's login shell"

# Layer 3: cargo-installed tools (Containerfile `toolchain` stage).
# Add `[[tool]]` entries with `manager = "cargo"` and `layer = 3`.
# Run `make gen-deps` to regenerate `dependencies/layer_3/cargo.txt`.
# (Currently empty — infrastructure-only landing per design spec §10 item 1.
# The empty cargo.txt is still generator-owned: see
# EXPECTED_EMPTY_FILES in programs/generate_deps/main.py.)

# Layer 4: paru-installed tools (AUR); Containerfile `aur` stage.
# paru itself is bootstrapped via makepkg in the `aur` stage, then used
# to install the rest of this list. Add `[[tool]]` entries with
# `manager = "paru"` and `layer = 4`. Run `make gen-deps` to regenerate
# `dependencies/layer_4/paru.txt`.
# (Infrastructure + one concrete AUR package (neovim-git) to exercise
# the full clone/build path. The paru.txt is still generator-owned: see
# EXPECTED_EMPTY_FILES in programs/generate_deps/main.py.)

[[tool]]
name = "paru"
manager = "paru"
layer = 4
has_configs = false
description = "AUR helper; bootstrapped via makepkg, then installs the rest of layer 4"

[[tool]]
name = "neovim-git"
manager = "paru"
layer = 4
has_configs = false
description = "neovim built from upstream git master (AUR); first concrete AUR package"

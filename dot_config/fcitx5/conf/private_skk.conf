# 入力方式
# 注意: libskk 1.1.1 はシステム /usr/share/libskk/rules/ のみを走査するため、
# user dir に置いた自作 rule は読まれない (skk.cpp:453 で load failure)。
# tmux prefix を SKK 非干渉キーに振ることで回避。
Rule=default
# 句読点スタイル
PunctuationStyle=Latin
# 初期入力モード
InitialInputMode=Latin
# ページサイズ
PageSize=7
# 候補のレイアウト
Candidate Layout=Vertical
# 確定時にリターンキーを押しても改行を挿入しない
EggLikeNewLine=True
# 注釈を表示
ShowAnnotation=True
# 候補の選択に使用するキー
CandidateChooseKey="Qwerty Center Row (a,s,d,...)"
# 候補ウィンドウを表示するまでの候補数
NTriggersToShowCandWin=4

[CandidatesPageUpKey]
0=Page_Up

[CandidatesPageDownKey]
0=Next

[CursorUp]
0=Up

[CursorDown]
0=Down

